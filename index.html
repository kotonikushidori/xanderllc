<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xander.llc.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #f8f7f4;
      --color-surface: #ffffff;
      --color-text: #1a1a18;
      --color-muted: #6b6b64;
      --color-accent: #2d6a4f;
      --color-accent-light: #e8f4ee;
      --color-border: #e4e2db;
      --font-main: 'Noto Sans JP', sans-serif;
      --header-h: 64px;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(248, 247, 244, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .header-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--color-text);
      text-decoration: none;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--color-accent);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    nav a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    nav a:hover {
      color: var(--color-text);
      background: var(--color-border);
    }

    nav a.active {
      color: var(--color-accent);
      background: var(--color-accent-light);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      border: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--color-muted);
      border: 1px solid var(--color-border);
    }

    .btn-ghost:hover {
      color: var(--color-text);
      border-color: var(--color-text);
    }

    .btn-primary {
      background: var(--color-accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #235c42;
    }

    /* ─── MAIN ─── */
    main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .placeholder-block {
      background: var(--color-surface);
      border: 1px dashed var(--color-border);
      border-radius: 12px;
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--color-muted);
      font-size: 0.875rem;
    }

    .placeholder-block svg {
      opacity: 0.3;
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--color-border);
      padding: 32px 24px;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--color-muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="/" class="logo">XanderLLC<span>.</span></a>

      <nav>
        <a href="#" class="active">ホーム</a>
        <a href="#">実績</a>
        <a href="#">会社情報</a>
        <a href="#">お知らせ</a>
      </nav>

      <div class="header-actions">
        <a href="#" class="btn btn-primary">お問い合わせ</a>
      </div>
    </div>
  </header>

  <main>
    <div class="placeholder-block">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      <p>コンテンツエリア</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 XanderLLC. All rights reserved.</p>
  </footer>

</body>
</html>
